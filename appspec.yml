version: 0.0
os: linux
files:
  - source: /
    destination: /home/ubuntu/E-Commerce-API
hooks:
  BeforeInstall:
    - location: scripts/before_install.sh
      timeout: 200
      runas: root
  AfterInstall:
    - location: scripts/after_install.sh
      timeout: 200
      runas: root
    - location: scripts/apply_migrations.sh
      timeout: 200
      runas: root
  ApplicationStart:
    - location: scripts/start.sh
      timeout: 200
      runas: root
  ApplicationStop:
    - location: scripts/stop.sh
      timeout: 200
      runas: root